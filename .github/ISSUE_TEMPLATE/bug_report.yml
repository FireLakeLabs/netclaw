name: Bug report
description: Report a defect in current behavior
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, prompts, and setup details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, .NET SDK, provider config, channel, and any relevant tokens or auth mode without secrets.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification already run
      description: List any build, format, test, or smoke checks you already ran.