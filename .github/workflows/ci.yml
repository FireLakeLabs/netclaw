name: CI

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore NetClaw.slnx

      - name: Verify formatting
        run: dotnet format NetClaw.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build NetClaw.slnx --no-restore

      - name: Test
        run: dotnet test NetClaw.slnx --no-build