name: CI

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore FireLakeLabs.NetClaw.slnx

      - name: Verify formatting
        run: dotnet format FireLakeLabs.NetClaw.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build FireLakeLabs.NetClaw.slnx --no-restore

      - name: Check for flaky test patterns
        run: |
          # Fail if Task.Delay is used for synchronization in unit tests.
          # Legitimate uses: polling loops with deadlines, infinite-delay-until-cancelled fakes,
          # and integration tests (which may need settling time) are excluded.
          hits=$(grep -rn 'Task\.Delay' tests/ --include='*.cs' \
            --exclude-dir='FireLakeLabs.NetClaw.IntegrationTests' \
            | grep -v 'Timeout\.InfiniteTimeSpan' \
            | grep -v 'while.*deadline' \
            | grep -v '// polling' \
            || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo '::error::Task.Delay found in unit tests. Use deterministic synchronization (TaskCompletionSource, SemaphoreSlim, ManualResetEventSlim) instead of arbitrary delays.'
            exit 1
          fi

      - name: Test
        run: dotnet test FireLakeLabs.NetClaw.slnx --no-build --blame-hang-timeout 30s