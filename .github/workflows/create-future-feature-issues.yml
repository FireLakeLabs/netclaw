name: Create Future Feature Issues

on:
  push:
    branches:
      - 'copilot/convert-future-features-to-issues'
    paths:
      - '.github/workflows/create-future-feature-issues.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from future-features
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const featuresDir = 'future-features';
            const files = fs.readdirSync(featuresDir)
              .filter(f => f.endsWith('.md') && f !== 'README.md')
              .sort();

            // Fetch all existing issues (open + closed) to avoid duplicates
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            const existingTitles = new Set(existing.map(i => i.title));

            for (const file of files) {
              const content = fs.readFileSync(path.join(featuresDir, file), 'utf8');
              const titleMatch = content.match(/^#\s+(.+)/m);
              if (!titleMatch) {
                console.log(`Skipping ${file}: no title found`);
                continue;
              }

              const title = titleMatch[1].trim();

              if (existingTitles.has(title)) {
                console.log(`Issue "${title}" already exists, skipping`);
                continue;
              }

              const result = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: content,
                labels: ['enhancement']
              });

              console.log(`Created issue #${result.data.number}: ${title}`);
            }
